site_name: CSBE - Computer Science for Backend Engineer
site_description: Backend Engineer를 위한 CS 강의 자료
site_author: Teo Jang
docs_dir: chapters

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 키워드 목록: KEYWORDS.md
  - Ch.1 왜 CS를 공부해야 하는가:
      - 이 강의에 대해: ch01/README.md
      - JD와 이해, 그리고 경험: ch01/01-why-cs.md
      - CS를 외워온다, 그리고 코딩과 CS: ch01/02-cs-and-coding.md
      - 어떻게 공부할 것인가: ch01/03-how-to-learn.md
      - 커리큘럼과 키워드 정리: ch01/04-summary.md
  - Ch.2 System Call과 커널:
      - 환경 세팅: ch02/README.md
      - 사례와 코드: ch02/01-case.md
      - print()는 어디로 가는가: ch02/02-print-internals.md
      - System Call이 왜 비싼가: ch02/03-syscall-cost.md
      - 유사 사례와 키워드 정리: ch02/04-summary.md
  - Ch.3 CPU Bound와 I/O Bound:
      - 환경 세팅: ch03/README.md
      - 사례와 코드: ch03/01-case.md
      - CPU Bound vs I/O Bound: ch03/02-cpu-io-bound.md
      - GIL과 동시성 전략: ch03/03-concurrency-gil.md
      - 유사 사례와 키워드 정리: ch03/04-summary.md
  - Ch.4 프로세스와 스레드:
      - 환경 세팅: ch04/README.md
      - 사례 A - ProcessPool OOM: ch04/01-case-process.md
      - Memory Layout: ch04/02-memory-layout.md
      - 사례 B - 카테고리 경로 조회: ch04/03-case-stack.md
      - Stack Frame과 Virtual Memory: ch04/04-virtual-memory.md
      - 유사 사례와 키워드 정리: ch04/05-summary.md
  - Ch.5 동시성 제어의 기초:
      - 환경 세팅: ch05/README.md
      - 사례 A - 재고가 마이너스가 됐다: ch05/01-case-race-condition.md
      - Critical Section과 Lock: ch05/02-critical-section.md
      - 사례 B - Lock을 걸었더니 먹통: ch05/03-case-deadlock.md
      - Deadlock의 조건과 Semaphore: ch05/04-deadlock-conditions.md
      - 유사 사례와 키워드 정리: ch05/05-summary.md
  - Ch.6 네트워크 기초:
      - 환경 세팅: ch06/README.md
      - 사례 - 서버는 살아있는데 요청이 실패한다: ch06/01-case-connection-pool.md
      - TCP/IP와 Socket: ch06/02-tcp-socket.md
      - Connection Pool과 Keep-Alive: ch06/03-connection-pool.md
      - 유사 사례와 키워드 정리: ch06/04-summary.md
  - Ch.7 AI와 CS 키워드:
      - 이 챕터에 대해: ch07/README.md
      - 사례 - 같은 문제, 다른 프롬프트: ch07/01-case.md
      - AI 코딩 도구의 작동 원리: ch07/02-how-ai-coding-works.md
      - CS 키워드로 AI를 제어하는 법: ch07/03-do-dont-patterns.md
      - 유사 사례와 키워드 정리: ch07/04-summary.md
