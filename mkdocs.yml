site_name: CSBE - Computer Science for Backend Engineer
site_description: Backend Engineer를 위한 CS 강의 자료
site_author: Teo Jang
docs_dir: chapters

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 키워드 목록: KEYWORDS.md
  - Ch.1 왜 CS를 공부해야 하는가:
      - 이 강의에 대해: ch01/README.md
      - JD와 이해, 그리고 경험: ch01/01-why-cs.md
      - CS를 외워온다, 그리고 코딩과 CS: ch01/02-cs-and-coding.md
      - 어떻게 공부할 것인가: ch01/03-how-to-learn.md
      - 커리큘럼과 키워드 정리: ch01/04-summary.md
  - Ch.2 System Call과 커널:
      - 환경 세팅: ch02/README.md
      - 사례와 코드: ch02/01-case.md
      - print()는 어디로 가는가: ch02/02-print-internals.md
      - System Call이 왜 비싼가: ch02/03-syscall-cost.md
      - 유사 사례와 키워드 정리: ch02/04-summary.md
  - Ch.3 CPU Bound와 I/O Bound:
      - 환경 세팅: ch03/README.md
      - 사례와 코드: ch03/01-case.md
      - CPU Bound vs I/O Bound: ch03/02-cpu-io-bound.md
      - GIL과 동시성 전략: ch03/03-concurrency-gil.md
      - 유사 사례와 키워드 정리: ch03/04-summary.md
  - Ch.4 프로세스와 스레드:
      - 환경 세팅: ch04/README.md
      - 사례 A - ProcessPool OOM: ch04/01-case-process.md
      - Memory Layout: ch04/02-memory-layout.md
      - 사례 B - 재귀 API: ch04/03-case-stack.md
      - Stack Frame과 Virtual Memory: ch04/04-virtual-memory.md
      - 유사 사례와 키워드 정리: ch04/05-summary.md
